server:
  port: 8083

spring:
  application:
    name: ms-miembros

  # 🗄️ CONFIGURACIÓN DE POSTGRESQL PARA RENDER
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ☕ CONFIGURACIÓN DE JPA / HIBERNATE
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: TXV5TGdyYVNlZ3VyYVBhcmFHeW1TeW5jMjAyNkNvbnRyYXNlbmE=

# ❌ EUREKA CONFIGURACIÓN (Deshabilitado para Render)
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# SWAGGER & SPRINGDOC
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc